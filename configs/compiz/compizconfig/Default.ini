[core]
as_active_plugins = core;svg;put;regex;move;mousepoll;place;text;workarounds;grid;png;dbus;splash;glib;bell;resize;decoration;imgjpeg;shift;focuspoll;animation;cube;rotate;blur;wallpaper;animationaddon;cubeaddon;
s0_refresh_rate = 60
s0_detect_refresh_rate = false
as_audible_bell = false
as_cursor_theme = Moga-Dark

[winrules]

[animation]
s0_open_matches = (type=Normal | Dialog | ModalDialog | Unknown) & !(name=mate-screensaver);(type=Menu | PopupMenu | DropdownMenu);(type=Notification | Utility) & !(name=compiz) & !(title=notify-osd);(type=Tooltip);
s0_open_effects = animation:Glide 2;animationaddon:Razr;animation:Zoom;animation:Magic Lamp;
s0_open_durations = 200;110;150;70;
s0_open_options = ;;;;
s0_close_effects = animation:Glide 2;animationaddon:Razr;animation:Zoom;animation:Magic Lamp;
s0_close_matches = (type=Normal | Dialog | ModalDialog | Unknown) & !(name=mate-screensaver);(type=Menu | PopupMenu | DropdownMenu);(type=Notification | Utility) & !(name=compiz) & !(title=notify-osd);(type=Tooltip);
s0_close_durations = 200;110;150;70;
s0_close_options = ;;;;
s0_sidekick_zoom_from_center = 3
s0_zoom_from_center = 3
s0_zoom_springiness = 0.530000
s0_minimize_durations = 340;

[blur]
s0_gaussian_radius = 4
s0_mipmap_lod = 3.100000

[workarounds]
as_notification_daemon_fix = true

[bell]
as_spatial_sounds = false

[wallpaper]
s0_randomize = false
s0_cycle = false
as_recursive = false
s0_bg_image = /home/ebrahim/.pizwall.jpg;
s0_bg_image_pos = 0;
s0_bg_fill_type = 0;
s0_bg_color1 = #000000ff;
s0_bg_color2 = #000000ff;

[shift]
as_next_key = <Alt>Tab

[grid]
as_put_left_key = <Super>Left
as_put_right_key = <Super>Right
as_put_top_key = <Super>Up
as_put_bottom_key = <Super>Down

[animationaddon]
s0_razr_direction = 0

[splash]
as_display_time = 2.500000
as_fade_time = 1.700000

